name: Release Extension

# Every step runs a `make` target so the whole release is reproducible locally.
# Versioning, changelog, tag, and push are handled by vership (`make release-*`).

on:
  repository_dispatch:
    types: [rumdl_release]
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'Release type'
        required: true
        default: extension-only
        type: choice
        options:
          - extension-only
          - rumdl-update
      rumdl_version:
        description: 'rumdl version to bundle (without v prefix)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (preview the bump; skip build/publish)'
        required: false
        default: false
        type: boolean

jobs:
  # Phase 1: update bundled rumdl (if needed), then bump + changelog + tag + push via vership.
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_mode: ${{ steps.meta.outputs.release_mode }}
      rumdl_version: ${{ steps.meta.outputs.rumdl_version }}
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # vership needs full history + tags to build the changelog

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # vership drives version bump + changelog + tag + push.
      # Swap for a prebuilt-binary install if one is available for faster CI.
      - uses: dtolnay/rust-toolchain@stable
      - name: Install vership
        run: cargo install vership --locked

      - name: Install dependencies
        run: npm ci

      - name: Determine release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            RELEASE_MODE="rumdl-update"
            VERSION="${{ github.event.client_payload.version }}"
          else
            RELEASE_MODE="${{ inputs.release_mode }}"
            VERSION="${{ inputs.rumdl_version }}"
          fi
          if [ "$RELEASE_MODE" = "rumdl-update" ] && [ -z "$VERSION" ]; then
            echo "::error::rumdl_version is required for a rumdl-update release"
            exit 1
          fi
          echo "release_mode=$RELEASE_MODE" >> "$GITHUB_OUTPUT"
          echo "rumdl_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify rumdl release exists
        if: ${{ steps.meta.outputs.release_mode == 'rumdl-update' }}
        run: |
          for i in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://api.github.com/repos/rvben/rumdl/releases/tags/v${{ steps.meta.outputs.rumdl_version }}")
            if [ "$CODE" = "200" ]; then exit 0; fi
            echo "rumdl v${{ steps.meta.outputs.rumdl_version }} not found yet (attempt $i/3), waiting for API propagation..."
            sleep 60
          done
          echo "::error::rumdl v${{ steps.meta.outputs.rumdl_version }} not found on GitHub releases"
          exit 1

      - name: Update bundled rumdl + schema
        if: ${{ steps.meta.outputs.release_mode == 'rumdl-update' && !inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          make set-rumdl-version RUMDL_VERSION=${{ steps.meta.outputs.rumdl_version }}
          make schema
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add scripts/download-rumdl.js
          git add -f schemas/ 2>/dev/null || true
          # sync-schema also regenerates src/configSchema.ts; stage it too so the tree
          # is clean before vership's pre-flight runs in the next step.
          git add src/configSchema.ts
          git commit -m "chore: update bundled rumdl to v${{ steps.meta.outputs.rumdl_version }}"

      - name: Release gate (lint + compile tests)
        run: make check

      - name: Bump version, changelog, tag, push
        id: bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            make release-patch VERSHIP_ARGS="--skip-checks --dry-run"
          else
            make release-patch VERSHIP_ARGS="--skip-checks"
          fi
          echo "new_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

  # Phase 2: build platform-specific VSIX packages in parallel.
  build:
    needs: prepare
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - win32-x64
          - darwin-x64
          - darwin-arm64
          - linux-x64
          - linux-arm64
          - alpine-x64
          - alpine-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build VSIX for ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make package-target TARGET=${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.target }}
          path: dist/*.vsix

  # Phase 3: publish to both registries and create the GitHub release.
  # ovsx + github-release use `always()` so an expired Marketplace token can't
  # silently skip the other publish targets.
  publish:
    needs: [prepare, build]
    if: ${{ !inputs.dry_run && !cancelled() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: vsix-*
          path: dist/
          merge-multiple: true
      - name: Validate VSIX artifacts
        run: |
          COUNT=$(find dist/ -name '*.vsix' | wc -l | tr -d ' ')
          echo "Found $COUNT VSIX package(s):"
          ls -lh dist/ || true
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No VSIX artifacts — all builds failed"
            exit 1
          fi
          if [ "$COUNT" -lt 7 ]; then
            echo "::warning::Only $COUNT/7 packages present (some builds failed); publishing the available ones"
          fi
      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: make publish-marketplace
      - name: Publish to Open VSX
        if: ${{ always() }}
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: make publish-ovsx
      - name: Create GitHub release
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make github-release

  dry-run-summary:
    needs: prepare
    if: ${{ inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "Dry run complete for '${{ needs.prepare.outputs.release_mode }}' mode."
          echo "Previewed the version bump and changelog via 'vership bump --dry-run'."
          echo "No commit, tag, build, or publish was performed."
